name: Publish VS Code Extension

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'packages/vscode-berry-extension/**'
      - '.github/workflows/publish-extension.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Build and Publish Extension
    runs-on: ubuntu-latest
    env:
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PNPM
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Dependencies and Extension
        run: |
          pnpm --filter @flexiberry/berrycore build
          pnpm --filter @flexiberry/language-server build
          pnpm --filter vscode-berry-extension build

      - name: Package VS Code Extension
        run: |
          cd packages/vscode-berry-extension
          npx vsce-pnpm package --pnpm
          VSIX_NAME=$(ls *.vsix)
          echo "VSIX_NAME=$VSIX_NAME" >> $GITHUB_ENV

      - name: Publish to Open VSX Registry
        if: ${{ env.OVSX_PAT != '' }}
        run: |
          cd packages/vscode-berry-extension
          npx ovsx publish ${{ env.VSIX_NAME }} -p ${{ env.OVSX_PAT }}
